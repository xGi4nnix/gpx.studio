# nginx config for gpx.studio static build
#
# SvelteKit + adapter-static produces fully prerendered HTML files
# (one .html per route). We need:
#   • clean URLs (e.g. /help → /help.html or /help/index.html)
#   • long-cache for hashed assets in /_app/
#   • no cache for index.html so deploys roll out immediately
#   • gzip for text payloads

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sensible defaults
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        font/ttf
        font/otf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Hashed SvelteKit assets — safe to cache forever
    location /_app/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Static assets shipped under /static (fonts, images, etc.)
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|avif|ico|svg|mp4|webm|wasm)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # HTML entry points — never cache, so updates are picked up immediately
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }

    # Clean-URL routing for prerendered pages.
    # Tries: exact file → file.html → directory/index.html → 404.html
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri.html $uri/index.html /404.html;
    }

    # Custom 404 if SvelteKit emitted one
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
